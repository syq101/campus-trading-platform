<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园二手交易 - 买家端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; }
        .header { background: #4CAF50; color: white; padding: 20px; text-align: center; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .user-info { margin-bottom: 20px; padding: 15px; background: white; border-radius: 8px; }
        .user-info input { padding: 8px; margin-right: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .user-info button { padding: 8px 16px; background: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background: #ddd; border: none; border-radius: 4px; cursor: pointer; }
        .tab-btn.active { background: #4CAF50; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .product-card h3 { margin-bottom: 10px; color: #333; }
        .product-card .price { font-size: 24px; color: #4CAF50; font-weight: bold; margin: 10px 0; }
        .product-card .description { color: #666; margin: 10px 0; }
        .product-card .seller { color: #999; font-size: 14px; margin-bottom: 15px; }
        .product-card button { width: 100%; padding: 10px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .product-card button:hover { background: #1976D2; }
        .product-card button:disabled { background: #ccc; cursor: not-allowed; }
        .order-list { list-style: none; }
        .order-item { background: white; border-radius: 8px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .order-item h4 { margin-bottom: 10px; }
        .order-item .price { color: #4CAF50; font-weight: bold; font-size: 18px; }
        .order-item .seller { color: #666; font-size: 14px; }
        .order-item .status { margin: 10px 0; padding: 5px 10px; display: inline-block; border-radius: 4px; font-size: 12px; }
        .status-pending { background: #fff3e0; color: #e65100; }
        .status-cancelled { background: #e0e0e0; color: #616161; }
        .status-return-requested { background: #e3f2fd; color: #1565c0; }
        .status-return-approved { background: #e8f5e9; color: #2e7d32; }
        .status-return-rejected { background: #ffebee; color: #c62828; }
        .order-item button { padding: 8px 15px; border: none; border-radius: 4px; cursor: pointer; margin-right: 10px; }
        .order-item .return-btn { background: #ff9800; color: white; }
        .order-item .cancel-btn { background: #f44336; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 400px; margin: 100px auto; padding: 20px; border-radius: 8px; }
        .modal-content h3 { margin-bottom: 15px; }
        .modal-content textarea { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; min-height: 80px; }
        .modal-content button { width: 100%; padding: 10px; margin-top: 10px; border: none; border-radius: 4px; cursor: pointer; }
        .modal-content .save-btn { background: #ff9800; color: white; }
        .modal-content .cancel-btn { background: #999; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>校园二手交易平台 - 买家端</h1>
    </div>
    
    <div class="container">
        <div class="user-info">
            <label>买家昵称：</label>
            <input type="text" id="buyerName" placeholder="输入您的昵称" value="买家小明">
            <button onclick="loadAllData()">刷新数据</button>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('products')">商品列表</button>
            <button class="tab-btn" onclick="switchTab('orders')">我的订单</button>
        </div>
        
        <div id="productsTab" class="tab-content active">
            <div class="products-grid" id="productsGrid"></div>
        </div>
        
        <div id="ordersTab" class="tab-content">
            <ul class="order-list" id="orderList"></ul>
        </div>
    </div>

    <div id="returnModal" class="modal">
        <div class="modal-content">
            <h3>申请退货</h3>
            <input type="hidden" id="returnOrderId">
            <label>退货原因：</label>
            <textarea id="returnReason" placeholder="请输入退货原因"></textarea>
            <button class="save-btn" onclick="submitReturn()">提交申请</button>
            <button class="cancel-btn" onclick="closeReturnModal()">取消</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const API_BASE = '/api';
        let currentBuyer = '';
        
        function getBuyerName() {
            return document.getElementById('buyerName').value.trim();
        }
        
        function loadAllData() {
            currentBuyer = getBuyerName();
            if (!currentBuyer) {
                alert('请先输入买家昵称！');
                return;
            }
            loadProducts();
            loadOrders();
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }
        
        function loadProducts() {
            fetch(`${API_BASE}/products`)
                .then(res => res.json())
                .then(products => {
                    const grid = document.getElementById('productsGrid');
                    grid.innerHTML = products.map(p => `
                        <div class="product-card">
                            <h3>${escapeHtml(p.name)}</h3>
                            <div class="price">¥${p.price.toFixed(2)}</div>
                            <div class="description">${escapeHtml(p.description || '暂无描述')}</div>
                            <div class="seller">卖家：${escapeHtml(p.seller)}</div>
                            <button onclick="buyProduct(${p.id}, '${escapeHtml(p.seller)}')">立即购买</button>
                        </div>
                    `).join('');
                })
                .catch(err => console.error('加载商品失败:', err));
        }
        
        function loadOrders() {
            fetch(`${API_BASE}/orders/buyer/${currentBuyer}`)
                .then(res => res.json())
                .then(orders => {
                    const list = document.getElementById('orderList');
                    if (orders.length === 0) {
                        list.innerHTML = '<li style="color:#999;padding:20px;text-align:center;">暂无订单</li>';
                    } else {
                        list.innerHTML = orders.map(o => {
                            let statusClass = 'status-pending';
                            let statusText = '待发货';
                            if (o.status === 'cancelled') {
                                statusClass = 'status-cancelled';
                                statusText = '已取消';
                            } else if (o.return_status === 'requested') {
                                statusClass = 'status-return-requested';
                                statusText = '退货申请中';
                            } else if (o.return_status === 'approved') {
                                statusClass = 'status-return-approved';
                                statusText = '退货已同意';
                            } else if (o.return_status === 'rejected') {
                                statusClass = 'status-return-rejected';
                                statusText = '退货被拒绝';
                            }
                            
                            const canCancel = o.status === 'pending' && o.return_status === 'none';
                            
                            return `
                                <li class="order-item">
                                    <h4>${escapeHtml(o.product_name)}</h4>
                                    <div class="price">¥${o.price.toFixed(2)}</div>
                                    <div class="seller">卖家：${escapeHtml(o.seller)}</div>
                                    <div class="status ${statusClass}">${statusText}</div>
                                    ${o.return_reason ? `<div style="color:#666;font-size:14px;">退货原因：${escapeHtml(o.return_reason)}</div>` : ''}
                                    <div style="margin-top:10px;">
                                        ${canCancel ? `<button class="cancel-btn" onclick="cancelOrder(${o.id})">取消订单</button>` : ''}
                                        ${canCancel ? `<button class="return-btn" onclick="openReturnModal(${o.id})">申请退货</button>` : o.return_status === 'none' && o.status !== 'cancelled' ? `<button class="return-btn" onclick="openReturnModal(${o.id})">申请退货</button>` : ''}
                                    </div>
                                    <div style="color:#999;font-size:12px;margin-top:10px;">${new Date(o.created_at).toLocaleString()}</div>
                                </li>
                            `;
                        }).join('');
                    }
                })
                .catch(err => console.error('加载订单失败:', err));
        }
        
        function cancelOrder(orderId) {
            if (!confirm('确定要取消这个订单吗？')) return;
            
            fetch(`${API_BASE}/orders/${orderId}/cancel`, {
                method: 'PUT'
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('取消失败：' + data.error);
                } else {
                    alert('订单已取消！');
                    loadOrders();
                }
            })
            .catch(err => {
                console.error('取消失败:', err);
                alert('取消失败，请稍后重试');
            });
        }
        
        function buyProduct(productId, seller) {
            if (!currentBuyer) {
                alert('请先输入买家昵称！');
                return;
            }
            
            fetch(`${API_BASE}/orders`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ product_id: productId, buyer: currentBuyer, seller })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('购买失败：' + data.error);
                } else {
                    alert('购买成功！');
                    loadAllData();
                }
            })
            .catch(err => {
                console.error('购买失败:', err);
                alert('购买失败，请稍后重试');
            });
        }
        
        function openReturnModal(orderId) {
            document.getElementById('returnOrderId').value = orderId;
            document.getElementById('returnReason').value = '';
            document.getElementById('returnModal').style.display = 'block';
        }
        
        function closeReturnModal() {
            document.getElementById('returnModal').style.display = 'none';
        }
        
        function submitReturn() {
            const orderId = document.getElementById('returnOrderId').value;
            const reason = document.getElementById('returnReason').value.trim();
            
            if (!reason) {
                alert('请填写退货原因！');
                return;
            }
            
            fetch(`${API_BASE}/orders/${orderId}/return`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reason })
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('申请失败：' + data.error);
                } else {
                    alert('退货申请已提交！');
                    closeReturnModal();
                    loadOrders();
                }
            })
            .catch(err => {
                console.error('申请失败:', err);
                alert('申请失败，请稍后重试');
            });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        const socket = io();
        socket.on('notification', (data) => {
            if (data.recipient === currentBuyer) {
                alert('新通知：' + data.message);
                loadOrders();
            }
        });
        
        document.getElementById('returnModal').addEventListener('click', function(e) {
            if (e.target === this) closeReturnModal();
        });
        
        currentBuyer = getBuyerName();
        loadAllData();
    </script>
</body>
</html>
